<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打字練習網</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --error: #e74c3c; --bg: #f5f7fa; }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .wrapper { max-width: 1100px; width: 100%; display: grid; grid-template-columns: 1fr 380px; gap: 20px; }
        @media (max-width: 900px) { .wrapper { grid-template-columns: 1fr; } }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { margin: 0 0 20px 0; font-size: 1.5rem; color: var(--primary); border-left: 5px solid var(--accent); padding-left: 15px; }
        
        /* 選單與統計 */
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; flex: 1; font-size: 1rem; }
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-item { background: #f8fafc; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #e2e8f0; }
        .stat-item small { display: block; color: #64748b; font-size: 0.8rem; margin-bottom: 4px; }
        .stat-item b { font-size: 1.3rem; color: var(--primary); }

        /* 輸入區域 */
        .text-display { 
            background: #fff; padding: 25px; border: 1px solid #e2e8f0; border-radius: 10px; 
            font-size: 1.4rem; line-height: 1.8; margin-bottom: 20px; min-height: 120px; 
            white-space: pre-wrap; word-wrap: break-word; user-select: none;
        }
        .char { color: #cbd5e1; border-bottom: 2px solid transparent; }
        .char.correct { color: #1e293b; }
        .char.incorrect { background: #fee2e2; color: var(--error); border-radius: 2px; }
        .char.current { border-bottom: 3px solid var(--accent); background: #e0f2fe; }

        textarea { 
            width: 100%; height: 110px; padding: 15px; font-size: 1.2rem; border: 2px solid #e2e8f0; 
            border-radius: 10px; resize: none; outline: none; transition: 0.2s; box-sizing: border-box;
        }
        textarea:focus { border-color: var(--accent); background: #fff; }

        /* 排行榜 */
        .history-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .history-table th { text-align: left; font-size: 0.8rem; color: #94a3b8; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .history-table td { padding: 12px 10px; font-size: 0.9rem; border-bottom: 1px solid #f8fafc; }
        .rank-tag { padding: 3px 7px; border-radius: 4px; font-size: 0.75rem; color: white; font-weight: bold; }
        .zh-bg { background: #f59e0b; } .en-bg { background: #3b82f6; }

        button { 
            padding: 10px 25px; background: var(--primary); color: white; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        button:hover { background: var(--accent); }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h2>打字練習網</h2>
        
        <div class="toolbar">
            <select id="langMenu" onchange="syncArticles()">
                <option value="zh">中文模式</option>
                <option value="en">English Mode</option>
            </select>
            <select id="articleMenu"></select>
            <button onclick="readyGo()">開始練習</button>
        </div>

        <div class="stats-bar">
            <div class="stat-item"><small>時間</small><b id="t_time">0</b>s</div>
            <div class="stat-item"><small>WPM</small><b id="t_wpm">0</b></div>
            <div class="stat-item"><small>正確率</small><b id="t_acc">100</b>%</div>
            <div class="stat-item"><small>錯字數</small><b id="t_err">0</b></div>
        </div>

        <div class="text-display" id="displayBox">請先選擇文章並點擊開始...</div>
        <textarea id="userInput" placeholder="在此輸入..." disabled></textarea>
    </div>

    <div class="card">
        <h2>排名紀錄 (Top 10)</h2>
        <table class="history-table">
            <thead>
                <tr>
                    <th>類型/文章</th>
                    <th>WPM</th>
                    <th>準確/錯誤</th>
                </tr>
            </thead>
            <tbody id="rankBody"></tbody>
        </table>
        <button onclick="clearData()" style="width:100%; margin-top:20px; background:#ef4444;">清空本地紀錄</button>
    </div>
</div>

<script src="articles.js"></script>

<script>
    const displayBox = document.getElementById('displayBox');
    const userInput = document.getElementById('userInput');
    const langMenu = document.getElementById('langMenu');
    const articleMenu = document.getElementById('articleMenu');
    
    let timer, startTime, isActive = false, targetText = "", targetTitle = "";

    // 初始化選單
    function syncArticles() {
        const lang = langMenu.value;
        articleMenu.innerHTML = articleDB[lang].map((item, i) => `<option value="${i}">${item.title}</option>`).join('');
    }

    // 開始遊戲
    function readyGo() {
        const lang = langMenu.value;
        const idx = articleMenu.value;
        const data = articleDB[lang][idx];
        targetText = data.content;
        targetTitle = data.title;

        // 重置狀態
        clearInterval(timer);
        isActive = false;
        userInput.value = "";
        userInput.disabled = false;
        userInput.focus();
        document.getElementById('t_time').innerText = "0";
        document.getElementById('t_wpm').innerText = "0";
        document.getElementById('t_acc').innerText = "100";
        document.getElementById('t_err').innerText = "0";

        // 渲染文章
        displayBox.innerHTML = targetText.split('').map((c, i) => 
            `<span class="char ${i===0?'current':''}">${c}</span>`
        ).join('');
    }

    userInput.addEventListener('input', () => {
        if (!isActive) {
            startTime = new Date();
            timer = setInterval(refreshStats, 1000);
            isActive = true;
        }

        const inputVal = userInput.value.split('');
        const spans = displayBox.querySelectorAll('.char');
        let corrects = 0;
        let errors = 0;

        spans.forEach((span, i) => {
            span.classList.remove('current');
            if (inputVal[i] == null) {
                span.classList.remove('correct', 'incorrect');
                if (i === inputVal.length) span.classList.add('current');
            } else if (inputVal[i] === span.innerText) {
                span.classList.add('correct');
                span.classList.remove('incorrect');
                corrects++;
            } else {
                span.classList.add('incorrect');
                span.classList.remove('correct');
                errors++;
            }
        });

        document.getElementById('t_err').innerText = errors;
        document.getElementById('t_acc').innerText = inputVal.length > 0 ? Math.floor((corrects / inputVal.length) * 100) : 100;

        if (inputVal.length >= targetText.length) finish();
    });

    function refreshStats() {
        const now = Math.floor((new Date() - startTime) / 1000);
        document.getElementById('t_time').innerText = now;
        if (now > 0) {
            // WPM: (總字數/5) / 分鐘
            const wpm = Math.round((userInput.value.length / 5) / (now / 60));
            document.getElementById('t_wpm').innerText = wpm;
        }
    }

    function finish() {
        clearInterval(timer);
        userInput.disabled = true;
        
        const record = {
            lang: langMenu.value,
            title: targetTitle,
            wpm: document.getElementById('t_wpm').innerText,
            acc: document.getElementById('t_acc').innerText,
            err: document.getElementById('t_err').innerText,
            time: new Date().toLocaleString()
        };

        let logs = JSON.parse(localStorage.getItem('typing_logs') || '[]');
        logs.unshift(record);
        localStorage.setItem('typing_logs', JSON.stringify(logs.slice(0, 10)));
        renderRank();
        alert(`完成！速度：${record.wpm} WPM`);
    }

    function renderRank() {
        const logs = JSON.parse(localStorage.getItem('typing_logs') || '[]');
        document.getElementById('rankBody').innerHTML = logs.map(l => `
            <tr>
                <td>
                    <span class="rank-tag ${l.lang}-bg">${l.lang.toUpperCase()}</span><br>
                    <small style="color:#64748b">${l.title}</small>
                </td>
                <td><b>${l.wpm}</b></td>
                <td>${l.acc}% / ${l.err}</td>
            </tr>
        `).join('');
    }

    function clearData() { if(confirm('確定清除所有成績嗎？')) { localStorage.removeItem('typing_logs'); renderRank(); } }

    syncArticles();
    renderRank();
</script>

</body>
</html>
